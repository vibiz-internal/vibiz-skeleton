name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # `npm install` (not `npm ci`) because the CTO frequently adds
      # dependencies on a turn without regenerating package-lock.json
      # — strict frozen-lockfile would fail every such PR. Vercel
      # uses `npm install` too, so this matches the source of truth.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # Guard: lib/posthog.tsx is Vibiz-managed. The CTO agent has
      # historically regressed this file by replacing the posthog-js
      # SDK provider with a raw `fetch('/capture/')` implementation,
      # which silently breaks session replay, autocapture, rage-click
      # detection, and identification cookies. Fail the build hard if:
      #   1. the canonical SDK import is missing from lib/posthog.tsx
      #   2. a parallel raw-capture file (posthog-events.ts, etc.) was
      #      added under lib/
      - name: Guard PostHog wiring
        run: |
          set -e
          if ! grep -q 'from "posthog-js"' lib/posthog.tsx; then
            echo "::error file=lib/posthog.tsx::lib/posthog.tsx must import posthog-js (the SDK). Raw fetch implementations break session replay + autocapture. See AGENTS.md > Analytics."
            exit 1
          fi
          rogue=$(find lib -maxdepth 2 -type f \( -name "posthog-events.*" -o -name "posthog-capture.*" -o -name "posthog-client.*" -o -name "posthog-track.*" \) ! -name "posthog.tsx" 2>/dev/null || true)
          if [ -n "$rogue" ]; then
            echo "::error::Unauthorized parallel PostHog files detected — delete and use posthog.capture() from posthog-js instead:"
            echo "$rogue"
            exit 1
          fi
          if grep -RE 'fetch\([^)]*"/capture/?"|fetch\([^)]*posthog\.com/capture' lib app components 2>/dev/null; then
            echo "::error::Raw POST to PostHog /capture/ endpoint detected. Use posthog.capture() from posthog-js — see AGENTS.md > Analytics."
            exit 1
          fi
          echo "✓ PostHog wiring guard passed"

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # `next build` directly (NOT `npm run build`) so the `prebuild`
      # script — which applies Drizzle migrations against DIRECT_URL
      # — is skipped. CI has no database; we just want to verify the
      # app compiles. Migrations are applied for real at Vercel build
      # time.
      - name: Build (skipping prebuild)
        run: npx --no-install next build
